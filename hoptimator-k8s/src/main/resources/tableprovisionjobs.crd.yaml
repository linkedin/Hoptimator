apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tableprovisionjobs.hoptimator.linkedin.com
spec:
  group: hoptimator.linkedin.com
  names:
    kind: TableProvisionJob
    listKind: TableProvisionJobList
    plural: tableprovisionjobs
    singular: tableprovisionjob
    shortNames:
    - tpj
  preserveUnknownFields: false
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          description: Job to provision backing infrastructure for a table.
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              description: TableProvisionJob spec.
              type: object
              properties:
                database:
                  description: Database the table belongs to.
                  type: string
                table:
                  description: Table name to provision.
                  type: string
              required:
              - database
              - table
            status:
              description: Filled in by the operator.
              type: object
              properties:
                ready:
                  description: Whether the table has been provisioned.
                  type: boolean
                failed:
                  description: Whether the provisioning has failed.
                  type: boolean
                message:
                  description: Error or success message, for information only.
                  type: string
      subresources:
        status: {}
      additionalPrinterColumns:
      - name: DATABASE
        type: string
        description: Database.
        jsonPath: .spec.database
      - name: TABLE
        type: string
        description: Table.
        jsonPath: .spec.table
      - name: STATUS
        type: string
        description: Job status.
        jsonPath: .status.message
