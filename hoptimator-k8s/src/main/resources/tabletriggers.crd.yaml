apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tabletriggers.hoptimator.linkedin.com
spec:
  group: hoptimator.linkedin.com
  names:
    kind: TableTrigger
    listKind: TableTriggerList
    plural: tabletriggers
    singular: tabletrigger
  preserveUnknownFields: false
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          description: Trigger for a specific table.
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              description: TableTrigger spec.
              type: object
              properties:
                catalog:
                  description: The catalog the table belongs to, e.g. OPENHOUSE. Optional; present only for 3-part identifiers.
                  type: string
                schema:
                  description: The schema the table belongs to, e.g. KAFKA.
                  type: string
                table:
                  description: The table name, e.g. PageViewEvent.
                  type: string
                yaml:
                  description: Specifies the Job to re/create when the trigger fires.
                  type: string
                jobProperties:
                  description: Additional source specific properties for the runtime of the job.
                  type: object
                  additionalProperties:
                    type: string
                schedule:
                  description: Cron schedule, e.g. "@hourly", which causes the trigger to fire on a schedule.
                  type: string
                paused:
                  description: Whether the trigger is paused.
                  type: boolean
              required:
              - schema
              - table
            status:
              description: TableTrigger status.
              type: object
              properties:
                timestamp:
                  description: Time at which the trigger was last fired.
                  type: string
                  format: date-time
                watermark:
                  description: Timestamp of the last successfully processed trigger event.
                  type: string
                  format: date-time
                backfillFrom:
                  description: >-
                    Start of a requested one-off backfill window. When backfillFrom and backfillTo
                    are both set, the operator runs a separate one-off Job over [backfillFrom,
                    backfillTo] without advancing the watermark, then clears these fields.
                  type: string
                  format: date-time
                backfillTo:
                  description: End of a requested one-off backfill window. See backfillFrom.
                  type: string
                  format: date-time
                lateWatermark:
                  description: >-
                    Internal cursor over the source's change stream (in arrival time) tracking how far
                    late or out-of-order changes behind the watermark have been consumed and repaired
                    via one-off backfills. This is plumbing for late-change repair and is not the
                    user-facing watermark; it never affects the incremental cursor.
                  type: string
                  format: date-time
                jobs:
                  description: State of jobs triggered by this trigger.
                  type: object
                  additionalProperties:
                    type: object
                    description: Properties of the job.
                    additionalProperties:
                      type: string
      subresources:
        status: {}
      additionalPrinterColumns:
      - name: PAUSED
        type: boolean
        description: Whether trigger is paused.
        jsonPath: .spec.paused
      - name: CATALOG
        type: string
        description: Catalog name.
        jsonPath: .spec.catalog
      - name: SCHEMA
        type: string
        description: Schema name.
        jsonPath: .spec.schema
      - name: TABLE
        type: string
        description: Table name.
        jsonPath: .spec.table
      - name: SCHEDULE
        type: string
        description: Cron schedule.
        jsonPath: .spec.schedule
      - name: TIMESTAMP
        type: string
        description: Time last fired.
        format: date-time
        jsonPath: .status.timestamp
      - name: WATERMARK
        type: string
        description: Last successful timestamp.
        format: date-time
        jsonPath: .status.watermark

