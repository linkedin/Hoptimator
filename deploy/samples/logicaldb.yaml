# Sample logical database configuration for local development.
#
# This defines a "standard" logical table flavor: nearline (Kafka) + online (Venice).
# The tier=nearline hint tells the schema to resolve tables to their Kafka connector
# config when used in a Flink streaming pipeline context.
#
# Prerequisites: kafkadb.yaml and venicedb.yaml must also be applied.

apiVersion: hoptimator.linkedin.com/v1alpha1
kind: Database
metadata:
  name: logical
spec:
  url: jdbc:logical://nearline=kafka-database;online=venice
  schema: LOGICAL
  dialect: Calcite
