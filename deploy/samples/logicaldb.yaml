# Sample logical database configuration for local development.
#
# This defines a logical table consisting of: nearline (Kafka) + online (Venice).

apiVersion: hoptimator.linkedin.com/v1alpha1
kind: Database
metadata:
  name: logical
spec:
  url: jdbc:logical://nearline=kafka-database;online=venice
  schema: LOGICAL
  dialect: Calcite

---

# This defines a logical table consisting of: nearline + offline (both are demo db).

apiVersion: hoptimator.linkedin.com/v1alpha1
kind: Database
metadata:
  name: logical-offline
spec:
  url: jdbc:logical://nearline=ads-database;offline=ads-catalog-database
  schema: LOGICAL-OFFLINE
  dialect: Calcite
