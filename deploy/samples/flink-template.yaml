## This template adds Flink support.

apiVersion: hoptimator.linkedin.com/v1alpha1
kind: JobTemplate
metadata:
  name: flink-template
spec:
  yaml: |
    apiVersion: hoptimator.linkedin.com/v1alpha1
    kind: SqlJob
    metadata:
      name: {{name}}
    spec:
      dialect: Flink
      executionMode: Streaming
      sql:
      - {{flinksql}}
      files:
        {{files}}
      {{flink.app.type==SQL}}
